interface:
  display_name: "Paper Figure Python"
  short_description: "Thin API runtime for scientific figures with style/layout priors and layout guard"
  default_prompt: "Use paper-figure-python as a thin API runtime. For new tasks, read SKILL.md, do minimal routing (task/layout/data path), create a thin job, then edit plot.py AI_EDIT_ZONE directly. Actual chart types and layers are implemented by the AI with matplotlib/seaborn through FigureContext; chart_type is only an intent label and defaults to custom. For modifications, edit the existing plot.py AI_EDIT_ZONE or regenerate thin plot.py only when route/layout changes require it. Prefer ctx.ax(), ctx.axis(), ctx.style, ctx.layout, ctx.palette(), ctx.df_override, and ctx.panel_dfs. Keep layout controlled by layout_guard_spec; do not bypass the runtime save/guard/crop path. Read references/drawing-priors.md only when layout or expression recommendations are needed. Always run the plot and check_workflow_compliance before delivery."
